<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colégio Laranjeiras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="cabecalho">
        <img class="cabecalho-imagem" src="colegio lds.png" alt="logo da escola">
        <ul class="cabecalho-lista">
            <li class="cabecalho-lista-item">Escola</li>
            <li class="cabecalho-lista-item">Estudante</li>
        </ul>
    </header>
   
    <section class="escola">
         <div class="escola-div-conteudo">
            <h2 class="escola-titulo">Sobre a Escola</h2>
            <p class="escola-texto-um">O Colégio Laranjeiras foi fundado em 1916, e visa a aprovação de todos os alunos em uma ótima universidade!</p>
            <p class="escola-texto-dois">Os alunos são dedicados e comprometidos em terem bons resultados.</p>
        </div>
        <img class="img-escola" src="colegio lds fachada.jpg" alt="fachada"> 
    </section>
    <section class=”estudantes”>
        <h2 class=”estudante-titulo”>Quem são nossos estudantes</h2>
        <img class=”estudante-imagem” src=”unnamed.png” alt=”foto do marcelo”>
        <h3 class=”estudante-nome”>Maria Clara Gavlik</h3>
        <img class="estudante-icone" src="github.png" alt="icone github">
    </section>
    
        
    </section>    
    

</body>
</html>
